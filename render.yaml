databases:
  - name: parque-cafe-db
    databaseName: parque_cafe
    user: parque_cafe_user
    plan: free

services:
  - type: web
    name: parque-cafe-api
    runtime: node
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run db:push && npm run db:seed && npm run build
    startCommand: npm start
    plan: free

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: parque-cafe-db
          property: connectionString
      
      - key: NODE_ENV
        value: production

      - key: NODE_VERSION
        value: 22

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 8h
        
      - key: UPLOAD_DIR
        value: uploads
        
      - key: FRONTEND_ORIGIN
        sync: false
